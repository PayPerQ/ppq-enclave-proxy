# Host TLS terminator for the browser path.
#
# Browsers connect to https://enclave.ppq.ai (real Let's Encrypt cert here).
# The request BODY is already end-to-end HPKE-encrypted (EHBP) to the enclave,
# so this host proxy only ever sees ciphertext — it just relays to the enclave's
# TLS listener (bridged from vsock by socat on 127.0.0.1:8443).
server {
    listen 443 ssl;
    server_name enclave.ppq.ai;

    ssl_certificate     /etc/letsencrypt/live/enclave.ppq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enclave.ppq.ai/privkey.pem;

    location / {
        proxy_pass https://127.0.0.1:8443;   # -> socat -> vsock -> enclave
        proxy_ssl_verify off;                # enclave uses an ephemeral self-signed cert

        # The browser's ehbp client must READ the Ehbp-Response-Nonce response
        # header from cross-origin JS to decrypt the response. Without exposing
        # it, the fetch succeeds but the header is hidden -> ProtocolError.
        add_header 'Access-Control-Expose-Headers' 'Ehbp-Response-Nonce' always;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;

        # Streaming (SSE / EHBP chunk frames): don't buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
